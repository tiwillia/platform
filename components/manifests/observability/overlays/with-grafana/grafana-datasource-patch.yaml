apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: https://thanos-querier.openshift-monitoring.svc:9091
        isDefault: true
        editable: false
        jsonData:
          httpHeaderName1: Authorization
          tlsSkipVerify: true
          timeInterval: 30s
          httpMethod: POST
        secureJsonData:
          httpHeaderValue1: Bearer INJECT_TOKEN_HERE
