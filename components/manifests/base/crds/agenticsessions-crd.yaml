apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: agenticsessions.vteam.ambient-code
spec:
  group: vteam.ambient-code
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Repository configuration
              repos:
                type: array
                description: "List of Git repositories to clone and work with"
                items:
                  type: object
                  required:
                  - url
                  properties:
                    url:
                      type: string
                      description: "Git repository URL"
                    branch:
                      type: string
                      description: "Branch to checkout"
                      default: "main"
                    autoPush:
                      type: boolean
                      default: false
                      description: "When true, automatically commit and push changes to this repository after session completion"
              initialPrompt:
                type: string
                description: "Initial prompt used only on first SDK invocation for brand new sessions (ignored on continuations or workflow restarts)."
              displayName:
                type: string
                description: "A descriptive display name for the agentic session generated from prompt and website"
              userContext:
                type: object
                description: "Authenticated caller identity captured at creation time (used for authorization and audit)"
                properties:
                  userId:
                    type: string
                    description: "Stable user identifier (from SSO, always overwritten from auth token)"
                  displayName:
                    type: string
                    description: "Human-readable display name"
                  groups:
                    type: array
                    items:
                      type: string
                    description: "Group memberships of the user"
              llmSettings:
                type: object
                properties:
                  model:
                    type: string
                    default: "claude-3-7-sonnet-latest"
                  temperature:
                    type: number
                    default: 0.7
                  maxTokens:
                    type: integer
                    default: 4000
                description: "LLM configuration settings"
              timeout:
                type: integer
                default: 300
                description: "Timeout in seconds for the agentic session"
              inactivityTimeout:
                type: integer
                minimum: 0
                description: "Seconds of inactivity before auto-stopping a session. 0 disables auto-shutdown. If omitted, falls back to project-level inactivityTimeoutSeconds, then 24h default."
              environmentVariables:
                type: object
                additionalProperties:
                  type: string
                description: >-
                  Key-value pairs injected as environment variables into all pod containers
                  (init-hydrate, runner, state-sync). Reserved variables (SESSION_NAME,
                  S3_ENDPOINT, S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, NAMESPACE,
                  SYNC_INTERVAL) cannot be overridden in init-hydrate and state-sync containers.
                  Common conventions: RUNNER_TYPE identifies the runner framework (e.g.
                  "claude-agent-sdk", "gemini-cli"), RUNNER_STATE_DIR sets the framework state
                  directory relative to /workspace (defaults to ".claude").
              activeWorkflow:
                type: object
                description: "Active workflow configuration for dynamic workflow switching"
                properties:
                  gitUrl:
                    type: string
                    description: "Git repository URL for the workflow"
                  branch:
                    type: string
                    description: "Branch to clone"
                    default: "main"
                  path:
                    type: string
                    description: "Optional path within repo (for repos with multiple workflows)"
              mcpServers:
                type: array
                description: "User-specified MCP servers for this session"
                items:
                  type: object
                  required:
                  - name
                  properties:
                    name:
                      type: string
                      description: "Unique server identifier (lowercase alphanumeric with hyphens)"
                    type:
                      type: string
                      enum: ["http", "stdio"]
                      default: "http"
                    url:
                      type: string
                      description: "Server URL (required for http type)"
                    command:
                      type: string
                      description: "Executable command (required for stdio type, e.g. uvx, npx)"
                    args:
                      type: array
                      items:
                        type: string
                      description: "Command arguments (stdio type only)"
                    env:
                      type: object
                      additionalProperties:
                        type: string
                      description: "Environment variables for the server. Use ${MCP_*} placeholders for credentials."
          status:
            type: object
            properties:
              observedGeneration:
                type: integer
                format: int64
                description: "Spec generation that the operator has fully reconciled."
              phase:
                type: string
                enum:
                - "Pending"
                - "Creating"
                - "Running"
                - "Stopping"
                - "Stopped"
                - "Completed"
                - "Failed"
                default: "Pending"
              startTime:
                type: string
                format: date-time
                description: "Timestamp when the session runner started executing."
              completionTime:
                type: string
                format: date-time
                description: "Timestamp when the session reached a terminal phase."
              reconciledRepos:
                type: array
                description: "Current reconciliation state for each repository."
                items:
                  type: object
                  properties:
                    url:
                      type: string
                    branch:
                      type: string
                      description: "DEPRECATED: Use currentActiveBranch instead"
                    branches:
                      type: array
                      description: "All local branches available in this repository"
                      items:
                        type: string
                    currentActiveBranch:
                      type: string
                      description: "Currently checked out branch (polled from filesystem)"
                    defaultBranch:
                      type: string
                      description: "Default branch of the remote repository (e.g., main, master)"
                    name:
                      type: string
                    status:
                      type: string
                      enum:
                      - "Cloning"
                      - "Ready"
                      - "Failed"
                    clonedAt:
                      type: string
                      format: date-time
              reconciledWorkflow:
                type: object
                description: "Current reconciliation state for the active workflow."
                properties:
                  gitUrl:
                    type: string
                  branch:
                    type: string
                  path:
                    type: string
                    description: "Optional path within the workflow repository"
                  status:
                    type: string
                    enum:
                    - "Cloning"
                    - "Active"
                    - "Failed"
                  appliedAt:
                    type: string
                    format: date-time
              lastActivityTime:
                type: string
                format: date-time
                description: "Timestamp of last recorded AG-UI activity in this session."
              stoppedReason:
                type: string
                enum:
                - "user"
                - "inactivity"
                description: "Reason the session was stopped."
              sdkSessionId:
                type: string
                description: "SDK session identifier captured for resume support."
              sdkRestartCount:
                type: integer
                description: "Number of times the SDK has been restarted during this session."
              conditions:
                type: array
                description: "Detailed condition set describing reconciliation progress."
                items:
                  type: object
                  required:
                  - type
                  - status
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - "Unknown"
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    observedGeneration:
                      type: integer
                      format: int64
  scope: Namespaced
  names:
    plural: agenticsessions
    singular: agenticsession
    kind: AgenticSession
    shortNames:
    - as
