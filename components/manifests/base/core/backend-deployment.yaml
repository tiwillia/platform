apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend-api
spec:
  replicas: 1  # Single pod for RWO PVC
  strategy:
    type: Recreate  # Required: RWO PVC cannot be multi-attached during rolling updates
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
        role: backend
    spec:
      serviceAccountName: backend-api
      containers:
      - name: backend-api
        image: quay.io/ambient_code/vteam_backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: PORT
          value: "8080"
        - name: STATE_BASE_DIR
          value: "/workspace"
        # Spec-kit configuration for RFE seeding
        - name: SPEC_KIT_REPO
          value: "ambient-code/spec-kit-rh"
        - name: SPEC_KIT_VERSION
          value: "main"
        # Spec-kit templates are only used when version is a tagged release
        - name: SPEC_KIT_TEMPLATE
          value: "spec-kit-template-claude-sh"
        - name: IMAGE_PULL_POLICY
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: IMAGE_PULL_POLICY
              optional: true
        # GitHub App authentication (optional - use this OR git-secret)
        - name: GITHUB_APP_ID
          valueFrom:
            secretKeyRef:
              name: github-app-secret
              key: GITHUB_APP_ID
              optional: true
        - name: GITHUB_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: github-app-secret
              key: GITHUB_PRIVATE_KEY
              optional: true
        - name: GITHUB_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: github-app-secret
              key: GITHUB_CLIENT_ID
              optional: true
        - name: GITHUB_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: github-app-secret
              key: GITHUB_CLIENT_SECRET
              optional: true
        - name: GITHUB_STATE_SECRET
          valueFrom:
            secretKeyRef:
              name: github-app-secret
              key: GITHUB_STATE_SECRET
              optional: true
        # Google OAuth configuration for workspace-mcp
        - name: GOOGLE_OAUTH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: GOOGLE_OAUTH_CLIENT_ID
              optional: true
        - name: GOOGLE_OAUTH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: GOOGLE_OAUTH_CLIENT_SECRET
              optional: true
        - name: OAUTH_STATE_SECRET
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: OAUTH_STATE_SECRET
              optional: true
        - name: BACKEND_URL
          valueFrom:
            secretKeyRef:
              name: google-workflow-app-secret
              key: BACKEND_URL
              optional: true
        # Operator image for scheduled session trigger jobs (CI pins via ConfigMap)
        - name: OPERATOR_IMAGE
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: OPERATOR_IMAGE
              optional: true
        # OOTB Workflows Configuration
        - name: OOTB_WORKFLOWS_REPO
          value: "https://github.com/ambient-code/workflows.git"
        - name: OOTB_WORKFLOWS_BRANCH
          value: "main"
        - name: OOTB_WORKFLOWS_PATH
          value: "workflows"
        # Vertex AI configuration from operator-config ConfigMap
        # Backend needs these for:
        # 1. USE_VERTEX: Expose vertexEnabled flag via /api/cluster-info
        # 2. Other Vertex vars: Display name auto-generation uses Claude Haiku via Vertex
        - name: USE_VERTEX
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: USE_VERTEX
              optional: true
        - name: CLOUD_ML_REGION
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: CLOUD_ML_REGION
              optional: true
        - name: ANTHROPIC_VERTEX_PROJECT_ID
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: ANTHROPIC_VERTEX_PROJECT_ID
              optional: true
        - name: GOOGLE_APPLICATION_CREDENTIALS
          valueFrom:
            configMapKeyRef:
              name: operator-config
              key: GOOGLE_APPLICATION_CREDENTIALS
              optional: true
        # LDAP configuration (optional - autocomplete gated by ldap.autocomplete.enabled feature flag)
        - name: LDAP_URL
          valueFrom:
            configMapKeyRef:
              name: ldap-config
              key: LDAP_URL
              optional: true
        - name: LDAP_BASE_DN
          valueFrom:
            configMapKeyRef:
              name: ldap-config
              key: LDAP_BASE_DN
              optional: true
        - name: LDAP_GROUP_BASE_DN
          valueFrom:
            configMapKeyRef:
              name: ldap-config
              key: LDAP_GROUP_BASE_DN
              optional: true
        - name: LDAP_SKIP_TLS_VERIFY
          valueFrom:
            configMapKeyRef:
              name: ldap-config
              key: LDAP_SKIP_TLS_VERIFY
              optional: true
        # Unleash feature flags (optional - all flags disabled when not set)
        - name: UNLEASH_URL
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: unleash-url
              optional: true
        - name: UNLEASH_CLIENT_KEY
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: client-api-token
              optional: true
        - name: UNLEASH_ADMIN_URL
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: unleash-admin-url
              optional: true
        - name: UNLEASH_ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: admin-api-token
              optional: true
        - name: UNLEASH_PROJECT
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: unleash-project
              optional: true
        - name: UNLEASH_ENVIRONMENT
          valueFrom:
            secretKeyRef:
              name: unleash-credentials
              key: unleash-environment
              optional: true
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1536Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: backend-state
          mountPath: /workspace
        # Vertex AI credentials (optional - only needed when USE_VERTEX=1)
        - name: vertex-credentials
          mountPath: /app/vertex
          readOnly: true
        # Model manifest (mounted ConfigMap — kubelet auto-syncs changes)
        - name: model-manifest
          mountPath: /config/models
          readOnly: true
        # Feature flags config (optional — kubelet auto-syncs changes)
        - name: flags-config
          mountPath: /config/flags
          readOnly: true
        # Agent registry (runner type definitions — kubelet auto-syncs changes)
        - name: agent-registry
          mountPath: /config/registry
          readOnly: true
      volumes:
      - name: backend-state
        persistentVolumeClaim:
          claimName: backend-state-pvc
      # ambient-vertex secret contains GCP service account key for Vertex AI
      # This secret must exist in the same namespace as the backend (ambient-code)
      # Created manually: kubectl create secret generic ambient-vertex --from-file=ambient-code-key.json=<path-to-key> -n ambient-code
      - name: vertex-credentials
        secret:
          secretName: ambient-vertex
          optional: true  # Don't fail if Vertex not configured
      # Model manifest ConfigMap (single source of truth for available models)
      - name: model-manifest
        configMap:
          name: ambient-models
          optional: true  # Don't fail if ConfigMap not yet created
      # Feature flags config (generic flags synced to Unleash on startup)
      - name: flags-config
        configMap:
          name: ambient-flags
          optional: true  # Don't fail if no generic flags defined
      # Agent registry ConfigMap (runner type definitions)
      - name: agent-registry
        configMap:
          name: ambient-agent-registry
          optional: true  # Don't fail if ConfigMap not yet created

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: backend-api
spec:
  selector:
    app: backend-api
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  type: ClusterIP
